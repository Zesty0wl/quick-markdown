name: QuickMarkdown
options:
  bundleIdPrefix: com.neiljohn
  deploymentTarget:
    macOS: "26.0"
  createIntermediateGroups: true
  groupSortPosition: top
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
    MARKETING_VERSION: "1.0.3"
    CURRENT_PROJECT_VERSION: "4"
    ENABLE_HARDENED_RUNTIME: YES
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    SWIFT_TREAT_WARNINGS_AS_ERRORS: NO
    GCC_TREAT_WARNINGS_AS_ERRORS: NO
    ASSETCATALOG_COMPILER_GENERATE_SWIFT_ASSET_SYMBOL_EXTENSIONS: YES

packages:
  swift-markdown:
    url: https://github.com/apple/swift-markdown
    branch: main

targets:
  QuickMarkdown:
    type: application
    platform: macOS
    deploymentTarget: "26.0"
    sources:
      - path: QuickMarkdown
        excludes:
          - "Info.plist"
          - "QuickMarkdown.entitlements"
    resources:
      - path: QuickMarkdown/Assets.xcassets
      - path: QuickMarkdown/PrivacyInfo.xcprivacy
    info:
      path: QuickMarkdown/Info.plist
      properties:
        CFBundleName: "Quick Markdown"
        CFBundleDisplayName: "Quick Markdown"
        CFBundleIdentifier: $(PRODUCT_BUNDLE_IDENTIFIER)
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        CFBundlePackageType: APPL
        LSMinimumSystemVersion: $(MACOSX_DEPLOYMENT_TARGET)
        NSPrincipalClass: NSApplication
        NSHumanReadableCopyright: "© 2026 Neil Johnson"
        NSSupportsAutomaticTermination: false
        NSSupportsSuddenTermination: false
        CFBundleDocumentTypes:
          - CFBundleTypeName: Markdown Document
            CFBundleTypeRole: Editor
            LSHandlerRank: Owner
            LSItemContentTypes:
              - net.daringfireball.markdown
              - public.plain-text
            CFBundleTypeExtensions:
              - md
              - markdown
            NSDocumentClass: $(PRODUCT_MODULE_NAME).MarkdownDocument
        UTImportedTypeDeclarations:
          - UTTypeIdentifier: net.daringfireball.markdown
            UTTypeDescription: Markdown Document
            UTTypeConformsTo:
              - public.plain-text
            UTTypeTagSpecification:
              public.filename-extension:
                - md
                - markdown
              public.mime-type:
                - text/markdown
    entitlements:
      path: QuickMarkdown/QuickMarkdown.entitlements
      properties:
        com.apple.security.app-sandbox: true
        com.apple.security.files.user-selected.read-write: true
        com.apple.security.print: true
        com.apple.security.network.client: true
        # Read-only sibling-asset access for relative-path images
        # (`![](media/foo.svg)`, DocFX `:::image source="media/…":::`).
        # xcodegen overwrites this file on each `xcodegen generate`, so
        # the entitlement MUST live here in project.yml — not just in the
        # plist — or it silently gets stripped on the next regen.
        com.apple.security.temporary-exception.files.home-relative-path.read-only:
          - "/"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.neiljohn.quickmarkdown
        PRODUCT_NAME: "Quick Markdown"
        PRODUCT_MODULE_NAME: QuickMarkdown
        GENERATE_INFOPLIST_FILE: NO
        COMBINE_HIDPI_IMAGES: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        MACOSX_DEPLOYMENT_TARGET: "26.0"
    # Code-signing lives in a separate xcconfig so xcodegen never wipes
    # the maintainer's local DEVELOPMENT_TEAM on regeneration. See the
    # comments at the top of `Signing.xcconfig`.
    configFiles:
      Debug: Signing.xcconfig
      Release: Signing.xcconfig
    dependencies:
      - package: swift-markdown
        product: Markdown
    # Generate a SHARED scheme so contributors (and CI) get a working
    # QuickMarkdown.xcscheme without re-running xcodegen.
    scheme: {}
