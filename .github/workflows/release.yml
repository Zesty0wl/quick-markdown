name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (for example v1.0.1)"
        required: true
        type: string
      release_name:
        description: "Release title"
        required: true
        type: string
      artifact_path:
        description: "Path to signed/notarized artifact in repo"
        required: true
        default: "./Quick Markdown-1.0.1.pkg"
        type: string
      prerelease:
        description: "Mark as pre-release"
        required: true
        default: false
        type: boolean
      draft:
        description: "Create as draft"
        required: true
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate artifact exists
        shell: bash
        run: |
          set -euo pipefail
          if [[ ! -f "${{ inputs.artifact_path }}" ]]; then
            echo "Artifact not found: ${{ inputs.artifact_path }}"
            exit 1
          fi

      - name: Generate SHA256 checksum
        shell: bash
        run: |
          set -euo pipefail
          ARTIFACT="${{ inputs.artifact_path }}"
          shasum -a 256 "$ARTIFACT" > "$ARTIFACT.sha256"

      - name: Create GitHub release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag }}
          name: ${{ inputs.release_name }}
          generate_release_notes: true
          draft: ${{ inputs.draft }}
          prerelease: ${{ inputs.prerelease }}
          files: |
            ${{ inputs.artifact_path }}
            ${{ inputs.artifact_path }}.sha256
