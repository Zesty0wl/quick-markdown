name: Build

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: macos-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Select latest available Xcode
        run: |
          set -euo pipefail
          sudo xcode-select -s /Applications/Xcode.app/Contents/Developer
          xcodebuild -version

      - name: Verify project has shared scheme
        run: |
          set -euo pipefail
          xcodebuild -list -project QuickMarkdown.xcodeproj

      - name: Resolve Swift packages
        run: |
          set -euo pipefail
          xcodebuild \
            -resolvePackageDependencies \
            -project QuickMarkdown.xcodeproj \
            -scheme QuickMarkdown

      - name: Build (universal, macOS 15+ deployment target)
        run: |
          set -euo pipefail
          xcodebuild \
            -project QuickMarkdown.xcodeproj \
            -scheme QuickMarkdown \
            -configuration Debug \
            -destination 'platform=macOS' \
            ONLY_ACTIVE_ARCH=NO \
            ARCHS='arm64 x86_64' \
            build
